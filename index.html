<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="hero">
      <h1>QR Code Generator</h1>
      <p>Generate a QR code for any website link.</p >
      <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="QR Code Icon" class="icon" />
    </div>
    <div class="card">
      <h1>QR Code Generator</h1>
      <p>Enter a website link and generate a downloadable QR code.</p>

      <form id="qrForm">
        <input
          id="urlInput"
          type="text"
          placeholder="https://example.com"
          required
        />
        <button type="submit">Generate QR Code</button>
      </form>

      <div class="preview" id="previewBox">
        <img id="qrImage" alt="Generated QR code" />
        <p id="previewText">Your QR code will appear here.</p>
      </div>
      <div class="message" id="messageBox"></div>

      <div class="actions">
        <button id="downloadBtn" class="secondary" type="button" disabled>
          Download PNG
        </button>
      </div>
    </div>

    <div class="footer">
      <p>
        Made with ❤️ by
        <a href="https://github.com/yourusername" target="_blank" rel="noopener noreferrer">
         gracey.dev
        </a>
      </p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
      if (!window.QRCode) {
        const fallback = document.createElement("script");
        fallback.src = "https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js";
        document.head.appendChild(fallback);
      }
    </script>
    <script src="index.js"></script>
  </body>
</html>
